<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS Virtual - Chatbot</title>
    <!-- Tailwind CSS CDN for easy customization -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="chat-style.css">
</head>
<body class="h-screen w-screen bg-gray-50 overflow-hidden font-sans">
    <main id="chat-container" class="flex flex-col h-full w-full max-w-7xl mx-auto shadow-2xl bg-white lg:my-0 lg:rounded-none">
        <!-- Header -->
        <header id="chat-header" class="flex items-center px-6 py-4 bg-white border-b border-gray-100 shadow-sm z-10 shrink-0">
            <div class="relative">
                <div class="w-10 h-10 rounded-full overflow-hidden border-2 border-indigo-50 bg-indigo-100 flex items-center justify-center">
                    <img id="bot-avatar" src="" alt="Bot Avatar" class="w-full h-full object-cover">
                </div>
                <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-white">
                    <span class="absolute inset-0 rounded-full bg-green-500 animate-ping opacity-75"></span>
                </div>
            </div>
            <div class="ml-4">
                <h1 id="bot-name" class="text-sm font-semibold text-gray-900 leading-none"></h1>
                <span id="bot-status" class="text-xs text-gray-500 mt-1 block"></span>
            </div>
        </header>

        <!-- Area Chat -->
        <div id="chat-area" class="flex-grow overflow-y-auto px-4 py-6 space-y-4 scroll-smooth">
            <!-- Messages will be injected here -->
        </div>

        <!-- Input Bar -->
        <div id="input-bar" class="bg-white border-t border-gray-100 p-4 shrink-0">
            <form id="chat-form" class="max-w-4xl mx-auto flex items-center space-x-2">
                <input 
                    id="chat-input" 
                    type="text" 
                    placeholder="Ketik pesan Anda..." 
                    class="flex-grow bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-xl focus:ring-indigo-500 focus:border-indigo-500 block w-full p-2.5 outline-none transition-all"
                    autocomplete="off"
                >
                <button 
                    id="send-button" 
                    type="submit" 
                    class="p-2.5 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 active:scale-95 disabled:opacity-50 disabled:active:scale-100 transition-all shadow-md shadow-indigo-100 flex items-center justify-center min-w-[44px] min-h-[44px]"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                </button>
            </form>
        </div>
    </main>

    <!-- Typing Template (Hidden) -->
    <template id="typing-template">
        <div class="flex justify-start typing-indicator">
            <div class="bg-gray-100 px-4 py-3 rounded-2xl rounded-tl-none flex items-center space-x-1">
                <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce"></div>
                <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce [animation-delay:0.2s]"></div>
                <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce [animation-delay:0.4s]"></div>
            </div>
        </div>
    </template>

    <script src="chat-agent.js"></script>
</body>
</html>
